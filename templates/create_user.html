<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DineTogether - 新建用户</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/utils.js"></script>
    <script>
        window.onload = async function() {
            if (!await checkAuth('/', 'admin')) return;
        }

        async function createUser(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            if (!username || !password || !role) {
                showMessage('error-message', '请填写所有字段！');
                return;
            }
            try {
                const result = await makeRequest('/users', 'POST', { username, password, role });
                if (result.message === '用户创建成功') {
                    showMessage('error-message', '用户创建成功！', false);
                    document.getElementById('form').reset();
                    setTimeout(() => location.href = '/user-manage', 1000);
                } else {
                    showMessage('error-message', result.error || '创建用户失败，请重试！');
                }
            } catch (error) {
                showMessage('error-message', error.message || '网络错误，请稍后重试！');
            }
        }
    </script>
</head>
<body>
    <div class="container container-narrow">
        <div class="card fade-in">
            <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">新建用户</h1>
            <form id="form" class="flex flex-col space-y-4" onsubmit="createUser(event)">
                <input id="username" type="text" placeholder="用户名" class="input">
                <input id="password" type="password" placeholder="密码" class="input">
                <select id="role" class="input">
                    <option value="guest">普通用户</option>
                    <option value="admin">管理员</option>
                </select>
                <div id="error-message" class="text-center hidden"></div>
                <button type="submit" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M8 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm9 6v4m0 0v4m0-4h-4m4 0h4"/></svg>
                    创建用户
                </button>
                <button type="button" onclick="location.href='/user-manage'" class="btn btn-secondary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
                    返回用户管理
                </button>
            </form>
        </div>
    </div>
</body>
</html>
