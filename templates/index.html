<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DineTogether - 欢迎</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/utils.js"></script>
    <script>
        async function joinDineTogether() {
            const user = await checkAuth('/login');
            if (user) {
                location.href = '/dashboard';
            }
        }
    </script>
</head>
<body>
    <div class="container container-narrow">
        <div class="card fade-in text-center">
            <h1 class="text-4xl font-bold text-gray-800 mb-4">DineTogether</h1>
            <p class="text-gray-600 mb-6 text-lg">与朋友一起点餐，共享美食的快乐！</p>
            <button onclick="joinDineTogether()" class="btn btn-primary">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
                开始使用
            </button>
            <div id="error-message" class="text-red-600 text-center hidden mt-4"></div>
        </div>
    </div>
</body>
</html>
