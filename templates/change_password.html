<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DineTogether - 修改密码</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/utils.js"></script>
    <script>
        window.onload = async function() {
            if (!await checkAuth('/login')) return;
        }

        async function changePassword(event) {
            event.preventDefault();
            const oldPassword = document.getElementById('old_password').value;
            const newPassword = document.getElementById('new_password').value;
            if (!oldPassword || !newPassword) {
                showMessage('error-message', '请填写旧密码和新密码！');
                return;
            }
            try {
                const result = await makeRequest('/change-password', 'POST', {
                    old_password: oldPassword,
                    new_password: newPassword
                });
                if (result.message === '密码修改成功') {
                    showMessage('error-message', '密码修改成功！', false);
                    setTimeout(() => location.href = '/dashboard', 1000);
                } else {
                    showMessage('error-message', result.error || '修改密码失败，请重试！');
                }
            } catch (error) {
                showMessage('error-message', error.message || '网络错误，请稍后重试！');
            }
        }
    </script>
</head>
<body>
    <div class="container container-narrow">
        <div class="card fade-in">
            <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">修改密码</h1>
            <form id="form" class="flex flex-col space-y-4" onsubmit="changePassword(event)">
                <input id="old_password" type="password" placeholder="旧密码" class="input">
                <input id="new_password" type="password" placeholder="新密码（至少6位）" class="input">
                <div id="error-message" class="text-center hidden"></div>
                <button type="submit" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15v2m-6 4h12a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2zm10-10V7a4 4 0 0 0-8 0v4h8z"/><path d="M20 6 9 17l-5-5"/></svg>
                    修改密码
                </button>
                <button type="button" onclick="location.href='/dashboard'" class="btn btn-secondary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
                    返回仪表盘
                </button>
            </form>
        </div>
    </div>
</body>
</html>
