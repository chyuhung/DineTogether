<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DineTogether - 加入 Party</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/utils.js"></script>
    <script>
        window.onload = async function() {
            const user = await checkAuth('/login');
            if (!user) return;
        }

        async function joinParty(event) {
            event.preventDefault();
            const partyName = document.getElementById('party_name').value;
            const password = document.getElementById('password').value;
            if (!partyName || !password) {
                showMessage('error-message', '请填写 Party 名称和密码！');
                return;
            }
            try {
                const result = await makeRequest('/join-party', 'POST', { party_name: partyName, password, user_id: 0 });
                if (result.message === '加入 Party 成功') {
                    showMessage('error-message', '加入 Party 成功！', false);
                    setTimeout(() => location.href = '/dashboard', 1000);
                } else {
                    showMessage('error-message', result.error || '加入 Party 失败，请重试！');
                }
            } catch (error) {
                showMessage('error-message', error.message || '网络错误，请稍后重试！');
            }
        }
    </script>
</head>
<body>
    <div class="container container-narrow">
        <div class="card fade-in">
            <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">加入 Party</h1>
            <form id="form" class="flex flex-col space-y-4" onsubmit="joinParty(event)">
                <input id="party_name" type="text" placeholder="Party 名称" class="input">
                <input id="password" type="password" placeholder="密码" class="input">
                <div id="error-message" class="text-center hidden"></div>
                <button type="submit" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm8 6v4m0 0v4m0-4h-4m4 0h4"/></svg>
                    加入 Party
                </button>
                <button type="button" onclick="location.href='/dashboard'" class="btn btn-secondary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
                    返回仪表盘
                </button>
            </form>
        </div>
    </div>
</body>
</html>
