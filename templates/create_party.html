<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DineTogether - 新建 Party</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
    <script>
        window.onload = async function() {
            if (!await checkAuth('/login', 'admin')) return;
        }

        async function createParty(event) {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const password = document.getElementById('password').value;
            const energyLeft = parseInt(document.getElementById('energy_left').value);
            if (!name || !password || !energyLeft) {
                showMessage('error-message', '请填写 Party 名称、密码和初始精力值！');
                return;
            }
            try {
                const result = await makeRequest('/parties', 'POST', { name, password, energy_left: energyLeft, is_active: true });
                if (result.message === 'Party 创建成功') {
                    showMessage('error-message', 'Party 创建成功！', false);
                    document.getElementById('form').reset();
                    setTimeout(() => location.href = '/party-manage', 1000);
                } else {
                    showMessage('error-message', result.error || '创建 Party 失败，请重试！');
                }
            } catch (error) {
                showMessage('error-message', error.message || '网络错误，请稍后重试！');
            }
        }
    </script>
</head>
<body>
    <div class="container container-narrow">
        <div class="card fade-in">
            <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">新建 Party</h1>
            <form id="form" class="flex flex-col space-y-4" onsubmit="createParty(event)">
                <input id="name" type="text" placeholder="Party 名称" class="input">
                <input id="password" type="password" placeholder="密码" class="input">
                <input id="energy_left" type="number" placeholder="初始精力值" class="input">
                <div id="error-message" class="text-center hidden"></div>
                <button type="submit" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14m-7-7h14"/></svg>
                    创建 Party
                </button>
                <button type="button" onclick="location.href='/party-manage'" class="btn btn-secondary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
                    返回 Party 管理
                </button>
            </form>
        </div>
    </div>
</body>
</html>
