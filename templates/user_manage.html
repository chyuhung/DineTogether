<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DineTogether - 用户管理</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/utils.js"></script>
    <style>
        .table-wrap { overflow-x: auto; }
        .table-wrap table { min-width: 400px; width: 100%; border-collapse: collapse; }
        .table-wrap th, .table-wrap td { border: 1px solid #e5e7eb; padding: 10px 12px; text-align: center; font-size: 15px; }
        .table-wrap th { background: #f9fafb; font-weight: 600; color: #374151; }
        .table-wrap tr:hover { background: #f3f4f6; }
    </style>
    <script>
        window.onload = async function() {
            if (!await checkAuth('/', 'admin')) return;
            document.getElementById('loading').classList.add('hidden');
            try {
                const result = await makeRequest('/users');
                if (result.message === '获取用户列表成功') {
                    const tbody = document.getElementById('user-table').getElementsByTagName('tbody')[0];
                    if (result.users.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/></svg>暂无用户数据</div></td></tr>';
                        return;
                    }
                    result.users.forEach(user => {
                        const row = tbody.insertRow();
                        const isAdmin = user.role === 'admin';
                        row.innerHTML = `
                            <td>${user.id}</td>
                            <td>${user.username}</td>
                            <td><span class="${isAdmin ? 'text-purple-600' : 'text-gray-600'} font-medium">${isAdmin ? '管理员' : '普通用户'}</span></td>
                            <td>
                                <div class="flex flex-col sm:flex-row justify-center gap-2">
                                    <button onclick="toggleRole(${user.id}, '${user.role}')" class="btn ${isAdmin ? 'btn-info' : 'btn-purple'}" style="padding:8px 12px;font-size:14px;width:auto">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px">${isAdmin ? '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/>' : '<path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M8 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm9 6v4m0 0v4m0-4h-4m4 0h4"/>'}</svg>
                                        ${isAdmin ? '取消管理员' : '设为管理员'}
                                    </button>
                                    <button onclick="location.href='/edit-user?id=${user.id}'" class="btn btn-info" style="padding:8px 12px;font-size:14px;width:auto">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><path d="M11 5H6a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2v-5m-1.414-9.414a2 2 0 0 1 2.828 0l1.586 1.586a2 2 0 0 1 0 2.828l-10 10L7 17l1.586-4.586 10-10z"/></svg>
                                        编辑
                                    </button>
                                    <button onclick="deleteUser(${user.id})" class="btn btn-danger" style="padding:8px 12px;font-size:14px;width:auto">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m3 0v12a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14"/></svg>
                                        删除
                                    </button>
                                </div>
                            </td>
                        `;
                    });
                } else {
                    showMessage('error-message', result.error || '加载用户列表失败！');
                }
            } catch (error) {
                showMessage('error-message', error.message || '网络错误，请稍后重试！');
            }
        }

        async function toggleRole(userId, currentRole) {
            const newRole = currentRole === 'admin' ? 'guest' : 'admin';
            const label = newRole === 'admin' ? '管理员' : '普通用户';
            if (!confirm(`确定将用户${currentRole === 'admin' ? '降级为普通用户' : '提升为管理员'}吗？`)) return;
            try {
                const result = await makeRequest(`/user/${userId}/role`, 'PUT', { role: newRole });
                if (result.message) {
                    showMessage('error-message', `${label}设置成功！`, false);
                    setTimeout(() => location.reload(), 1000);
                } else {
                    showMessage('error-message', result.error || '角色切换失败，请重试！');
                }
            } catch (error) {
                showMessage('error-message', error.message || '网络错误，请稍后重试！');
            }
        }

        async function deleteUser(userId) {
            if (!confirm('确定要删除此用户吗？')) return;
            try {
                const result = await makeRequest(`/user/${userId}`, 'DELETE');
                if (result.message === '用户删除成功') {
                    showMessage('error-message', '用户删除成功！', false);
                    setTimeout(() => location.reload(), 1000);
                } else {
                    showMessage('error-message', result.error || '删除用户失败，请重试！');
                }
            } catch (error) {
                showMessage('error-message', error.message || '删除用户失败，请稍后重试！');
            }
        }
    </script>
</head>
<body style="align-items:flex-start;padding-top:32px">
    <div class="container container-wide">
        <div class="card fade-in">
            <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">用户管理</h1>
            <div id="error-message" class="text-center hidden mb-4"></div>
            <div id="loading" class="loading"><div class="spinner"></div>加载中...</div>
            <button onclick="location.href='/create-user'" class="btn btn-primary mb-4">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M8 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm9 6v4m0 0v4m0-4h-4m4 0h4"/></svg>
                新建用户
            </button>
            <div class="table-wrap">
                <table id="user-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>角色</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <button onclick="location.href='/dashboard'" class="btn btn-secondary mt-4">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
                返回仪表盘
            </button>
        </div>
    </div>
</body>
</html>
