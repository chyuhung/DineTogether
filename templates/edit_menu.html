<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DineTogether - 编辑菜品</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/utils.js"></script>
    <script>
        let imageURLs = [];

        window.onload = async function() {
            if (!await checkAuth('/', 'admin')) return;
            const urlParams = new URLSearchParams(window.location.search);
            const menuId = urlParams.get('id');
            if (!menuId) {
                showMessage('error-message', '无效的菜品 ID！');
                return;
            }
            try {
                const result = await makeRequest(`/menu/${menuId}`);
                if (result.message === '获取菜品成功') {
                    document.getElementById('name').value = result.menu.name;
                    document.getElementById('description').value = result.menu.description || '';
                    document.getElementById('energy_cost').value = result.menu.energy_cost;
                    imageURLs = result.menu.image_urls || [];
                    updateImagePreview();
                } else {
                    showMessage('error-message', result.error || '加载菜品失败！');
                }
            } catch (error) {
                showMessage('error-message', error.message || '网络错误，请稍后重试！');
            }
            document.getElementById('images').addEventListener('change', async (event) => {
                const files = event.target.files;
                if (files.length + imageURLs.length > 5) {
                    showMessage('error-message', '最多上传5张图片！');
                    event.target.value = '';
                    return;
                }
                for (const file of files) {
                    if (file.size > 2 * 1024 * 1024) {
                        showMessage('error-message', '每张图片不能超过2MB！');
                        event.target.value = '';
                        return;
                    }
                    if (!['image/jpeg', 'image/png'].includes(file.type)) {
                        showMessage('error-message', '仅支持jpg/png格式！');
                        event.target.value = '';
                        return;
                    }
                }
                try {
                    const urls = await uploadImages(files);
                    imageURLs = imageURLs.concat(urls);
                    updateImagePreview();
                    event.target.value = '';
                } catch (error) {
                    showMessage('error-message', error.message);
                    event.target.value = '';
                }
            });
        }

        function updateImagePreview() {
            const preview = document.getElementById('image-preview');
            preview.innerHTML = '';
            imageURLs.forEach(url => {
                const container = document.createElement('div');
                container.className = 'relative w-24 h-24 m-1';
                container.innerHTML = `
                    <img src="${url}" class="w-full h-full object-cover rounded">
                    <button type="button" class="absolute top-0 right-0 bg-red-600 text-white rounded-full w-6 h-6 flex items-center justify-center text-sm font-bold hover:bg-red-700" onclick="removeImage('${url}')">×</button>
                `;
                preview.appendChild(container);
            });
        }

        async function removeImage(url) {
            if (!confirm('确定要删除此图片吗？')) return;
            try {
                await deleteImage(url);
                imageURLs = imageURLs.filter(u => u !== url);
                updateImagePreview();
                showMessage('error-message', '图片删除成功！', false);
            } catch (error) {
                showMessage('error-message', error.message);
            }
        }

        async function updateMenu(event) {
            event.preventDefault();
            const urlParams = new URLSearchParams(window.location.search);
            const menuId = urlParams.get('id');
            const name = document.getElementById('name').value;
            const description = document.getElementById('description').value;
            const energyCost = parseInt(document.getElementById('energy_cost').value);
            if (!name || !energyCost) {
                showMessage('error-message', '请填写菜品名称和精力消耗！');
                return;
            }
            try {
                const result = await makeRequest(`/menu/${menuId}`, 'PUT', {
                    name,
                    description,
                    energy_cost: energyCost,
                    image_urls: imageURLs
                });
                if (result.message === '菜品更新成功') {
                    showMessage('error-message', '菜品更新成功！', false);
                    setTimeout(() => location.href = '/menu-manage', 1000);
                } else {
                    showMessage('error-message', result.error || '更新菜品失败，请重试！');
                }
            } catch (error) {
                showMessage('error-message', error.message || '网络错误，请稍后重试！');
            }
        }
    </script>
</head>
<body>
    <div class="container container-narrow">
        <div class="card fade-in">
            <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">编辑菜品</h1>
            <form id="form" class="flex flex-col space-y-4" onsubmit="updateMenu(event)">
                <input id="name" type="text" placeholder="菜品名称" class="input">
                <textarea id="description" placeholder="描述" rows="4" class="input"></textarea>
                <input id="energy_cost" type="number" placeholder="精力消耗" min="1" class="input">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">菜品图片（最多5张）</label>
                    <input id="images" type="file" accept="image/jpeg,image/png" multiple class="input">
                    <div id="image-preview" class="flex flex-wrap justify-center mt-2"></div>
                </div>
                <div id="error-message" class="text-center hidden"></div>
                <button type="submit" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                    保存更改
                </button>
                <button type="button" onclick="location.href='/menu-manage'" class="btn btn-secondary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
                    返回菜单管理
                </button>
            </form>
        </div>
    </div>
</body>
</html>
